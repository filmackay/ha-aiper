name: Validation

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run hassfest
        id: hassfest
        uses: home-assistant/actions/hassfest@master
        continue-on-error: true

      - name: Run HACS validation
        id: hacs
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands
        continue-on-error: true

      - name: Install uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        id: sync
        run: uv sync --locked --group dev
        continue-on-error: true

      - name: Run Ruff
        id: ruff
        run: uv run --frozen ruff check custom_components/
        continue-on-error: true

      - name: Run mypy
        id: mypy
        run: uv run --frozen mypy custom_components/
        continue-on-error: true

      - name: Run tests
        id: pytest
        run: uv run --frozen pytest
        continue-on-error: true

      - name: Check validation outcomes
        if: ${{ always() }}
        run: |
          failed=0

          check_step() {
            name="$1"
            outcome="$2"
            if [ "$outcome" = "success" ]; then
              echo "PASSED: ${name}"
              echo "::notice title=${name}::passed"
            else
              echo "FAILED: ${name} (outcome=${outcome})"
              echo "::error title=${name} failed::outcome=${outcome}"
              failed=1
            fi
          }

          check_step "hassfest" "${{ steps.hassfest.outcome }}"
          check_step "HACS validation" "${{ steps.hacs.outcome }}"
          check_step "uv setup" "${{ steps.setup-uv.outcome }}"
          check_step "dependency sync" "${{ steps.sync.outcome }}"
          check_step "Ruff" "${{ steps.ruff.outcome }}"
          check_step "mypy" "${{ steps.mypy.outcome }}"
          check_step "pytest" "${{ steps.pytest.outcome }}"

          exit "$failed"
