name: Validation

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run hassfest
        id: hassfest
        uses: home-assistant/actions/hassfest@master
        continue-on-error: true

      - name: Run HACS validation
        id: hacs
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands
        continue-on-error: true

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        id: sync
        run: uv sync --locked --group dev
        continue-on-error: true

      - name: Run Ruff
        id: ruff
        run: uv run --frozen ruff check custom_components/
        continue-on-error: true

      - name: Run mypy
        id: mypy
        run: uv run --frozen mypy custom_components/
        continue-on-error: true

      - name: Run tests
        id: pytest
        run: uv run --frozen pytest
        continue-on-error: true

      - name: Check validation outcomes
        if: ${{ always() }}
        run: |
          test "${{ steps.hassfest.outcome }}" = "success"
          test "${{ steps.hacs.outcome }}" = "success"
          test "${{ steps.setup-python.outcome }}" = "success"
          test "${{ steps.setup-uv.outcome }}" = "success"
          test "${{ steps.sync.outcome }}" = "success"
          test "${{ steps.ruff.outcome }}" = "success"
          test "${{ steps.mypy.outcome }}" = "success"
          test "${{ steps.pytest.outcome }}" = "success"
